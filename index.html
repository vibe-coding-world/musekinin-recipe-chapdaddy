<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>無責任レシピ - ホーム</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&family=Oswald:wght@200..700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="./css/style_v2.css">
  <script src="./js/app-header.js" defer></script>
  <script src="./js/mood-section.js" defer></script>
  <script src="./js/recipe-list.js" defer></script>
  <script src="./js/shop-banner.js" defer></script>
  <script src="./js/shop-side-banners.js" defer></script>
  <script src="./js/app-footer.js" defer></script>
</head>

<body>
  <div class="la_app">
    <app-header title="無責任レシピ Chapdaddy" subtitle="そのとおりにすれば「だいたい旨い」"></app-header>

    <main>
      <section class="c_home-hero">
        <img class="c_home-hero__image" src="./assets/images/home_hero_cooking_01.png" alt="気分で選べる料理が並ぶ明るい食卓">
        <div class="c_home-hero__copy">
          <p class="c_home-hero__eyebrow">考えすぎない男飯</p>
          <h2 class="text-hd-t01">今の気分で選ぶ。</h2>
          <p class="c_home-hero__text">直感で決める。だいたい旨いところまで連れていく。</p>
        </div>
      </section>

      <mood-section></mood-section>

      <section class="la_section la_stack u_stack_20">
        <div class="c_heading c_heading--center">
          <img class="c_heading__icon c_heading__icon--chapdaddy" src="./assets/images/icon-chapdaddy.avif" alt="">
          <h2 class="text-hd-t02">今のおすすめ</h2>
        </div>

        <div class="la_grid c_recipe-list" data-home-recipe-list>
          <a class="c_list-recipe c_list-recipe--featured" href="detail.html?id=uni_cream_pasta">
            <img class="c_list-recipe__image" src="./assets/images/uni_cream_pasta_hero.png" alt="濃厚うにクリームパスタ">
            <span class="c_list-recipe__body">
              <small class="c_list-recipe__scene">今日の自分、よくやった</small>
              <strong class="text-hd-t03">濃厚うにクリームパスタ</strong>
              <span class="la_cluster c_list-recipe__meta">
                <span>20分</span>
                <span>★★★☆☆</span>
                <span>780 kcal</span>
              </span>
            </span>
          </a>

          <a class="c_list-recipe" href="detail.html?id=karaage">
            <img class="c_list-recipe__image" src="./assets/images/karaage_hero.png" alt="究極のからあげ">
            <span class="c_list-recipe__body">
              <small class="c_list-recipe__scene">揚げ物って幸せ</small>
              <strong class="text-hd-t03">究極のからあげ</strong>
              <span class="la_cluster c_list-recipe__meta">
                <span>30分</span>
                <span>★★★★☆</span>
                <span>1550 kcal</span>
              </span>
            </span>
          </a>

          <a class="c_list-recipe" href="detail.html?id=hamburg">
            <img class="c_list-recipe__image" src="./assets/images/hamburg_step_5_finish.png" alt="びくどん風ハンバーグ">
            <span class="c_list-recipe__body">
              <small class="c_list-recipe__scene">ガッツリ食べたい日</small>
              <strong class="text-hd-t03">びくどん風ハンバーグ</strong>
              <span class="la_cluster c_list-recipe__meta">
                <span>30分</span>
                <span>★★★☆☆</span>
                <span>1320 kcal</span>
              </span>
            </span>
          </a>
        </div>
      </section>

      <section class="la_section la_stack u_stack_20">
        <div class="c_heading c_heading--center">
          <img class="c_heading__icon c_heading__icon--chapdaddy" src="./assets/images/icon-chapdaddy.avif" alt="">
          <h2 class="text-hd-t02">無責任レシピとは</h2>
        </div>
        <ul class="text-ul-t01">
          <li>代表デザイナー コヤマの大学ノートの秘伝のレシピから発案したサイトです。</li>
          <li>等の内容を掲載予定。調整中。</li>
          <li>サイト間を繋ぐ要素。</li>
        </ul>
      </section>

    </main>

    <shop-banner></shop-banner>
    <app-footer></app-footer>
  </div>
</body>

</html>
